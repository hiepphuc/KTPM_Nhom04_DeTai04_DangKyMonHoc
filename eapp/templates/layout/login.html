<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống Đăng ký Khóa học</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #2980b9 50%, #6dd5fa 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .hop_dangnhap {
            background: white;
            border-radius: 20px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.25);
        }
        .logo_vong {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #1e3a5f, #2980b9);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
        }
        .logo_vong i { font-size: 2rem; color: white; }
        h2 { text-align: center; font-weight: 700; color: #1e3a5f; margin-bottom: 6px; }
        .mo_ta { text-align: center; color: #6c757d; font-size: .9rem; margin-bottom: 28px; }
        .form-label { font-weight: 600; color: #444; font-size: .9rem; }
        .form-control {
            border-radius: 10px;
            padding: 12px 16px;
            border: 1.5px solid #dee2e6;
            font-size: .95rem;
        }
        .form-control:focus {
            border-color: #2980b9;
            box-shadow: 0 0 0 3px rgba(41,128,185,.15);
        }
        .nhom_input { position: relative; }
        .nhom_input .bi {
            position: absolute; left: 14px; top: 50%;
            transform: translateY(-50%);
            color: #6c757d; font-size: 1.1rem;
        }
        .nhom_input .form-control { padding-left: 42px; }
        .nut_dangnhap {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #1e3a5f, #2980b9);
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity .2s;
            margin-top: 6px;
        }
        .nut_dangnhap:hover { opacity: .9; }
        .canh_bao { border-radius: 10px; font-size: .9rem; }
    </style>
</head>
<body>
<div class="hop_dangnhap">
    <div class="logo_vong">
        <i class="bi bi-mortarboard-fill"></i>
    </div>
    <h2>Đăng nhập</h2>
    <p class="mo_ta">Hệ thống Quản lý Đăng ký Khóa học</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for loai, noi_dung in messages %}
        <div class="alert alert-{{ loai }} canh_bao">
            <i class="bi bi-exclamation-circle me-2"></i>{{ noi_dung }}
        </div>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <div>
        <div class="mb-3">
            <label class="form-label">Email</label>
            <div class="nhom_input">
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" class="form-control"
                       placeholder="example@edu.vn" required autofocus>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label">Mật khẩu</label>
            <div class="nhom_input">
                <i class="bi bi-lock"></i>
                <input type="password" name="mat_khau" class="form-control"
                       placeholder="Nhập mật khẩu" required>
            </div>
        </div>
        <button type="submit" class="nut_dangnhap">
            <i class="bi bi-box-arrow-in-right me-2"></i>Đăng nhập
        </button>
    </div>


</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
