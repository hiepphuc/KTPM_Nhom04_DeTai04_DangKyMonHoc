{% extends 'base.html' %}
{% block tieu_de_trang %}ĐĂNG KÝ TÀI KHOẢN{% endblock %}

{% block noi_dung %}
<div class="container d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow-sm border-0 p-4" style="width: 100%; max-width: 500px; border-radius: 15px;">

        <div class="text-center mb-4">
            <i class="bi bi-person-plus-fill text-primary" style="font-size: 2.5rem;"></i>
            <h4 class="fw-bold mt-2">Đăng ký tài khoản</h4>
        </div>

        <form method="POST" action="{{ url_for('register') }}">

            <div class="mb-3">
                <label class="form-label fw-semibold">Họ và tên</label>
                <input type="text" name="name" class="form-control" placeholder="name" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mã sinh viên</label>
                <input type="text" name="student_id" class="form-control" placeholder="Nhập MSSV" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Email</label>
                <input type="email" name="email" class="form-control" placeholder="email" required>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Xác nhận mật khẩu</label>
                <input type="password" name="password_confirm" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">Đăng ký</button>

            <div class="text-center mt-3">
                <a href="{{ url_for('login') }}" class="text-primary fw-semibold small">Đăng nhập ngay</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
